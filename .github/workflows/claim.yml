name: Bot-Hosting 自动领取

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛡️ 启动 Gost 代理转发
        run: |
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          mv gost-linux-amd64-2.11.5 gost
          nohup ./gost -L socks5://:1080 -F socks5://1:1@38.146.29.26:9004 > gost.log 2>&1 &
          sleep 3
          curl --socks5 127.0.0.1:1080 https://api.ipify.org -s

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb

      - name: 🐍 安装 Python 依赖
        run: |
          pip install playwright hcaptcha-challenger
          playwright install chromium
          playwright install-deps chromium

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python main.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
